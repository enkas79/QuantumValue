name: CI (Test & Type Check)

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Dipendenze di sistema per Qt headless
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libfontconfig1

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yfinance pandas requests httpx tenacity cryptography keyring
        pip install pytest pytest-cov pytest-qt mypy

    - name: Esecuzione test (pytest)
      env:
        QT_QPA_PLATFORM: offscreen
      run: pytest -q

    - name: Controllo tipi (mypy)
      run: mypy src
