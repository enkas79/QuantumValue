name: Build QuantumValue Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Aggiunto per permetterti l'avvio manuale tramite pulsante

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yfinance pandas requests pyinstaller

    - name: Creazione EXE con PyInstaller
      run: |
        # Usiamo --onedir per massime prestazioni ed evitiamo il blocco console con --noconsole
        pyinstaller --onedir --noconsole --name=QuantumValue_Analysis QuantumValue_Analysis.py
      # Se in futuro vorrai aggiungere un'icona, ti basterà caricare logo.ico nella repo 
      # e aggiungere --icon=logo.ico al comando qui sopra.

    - name: Archiviazione Risultato
      uses: actions/upload-artifact@v4
      with:
        name: QuantumValue-Windows-Binary
        # Salviamo l'intera cartella creata da PyInstaller. 
        # GitHub Actions la trasformerà automaticamente in uno .zip scaricabile.
        path: dist/QuantumValue_Analysis
