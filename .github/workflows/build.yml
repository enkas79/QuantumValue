name: Build QuantumValue (Windows, Linux & macOS)

on:
  push:
    branches: [ main ]
    paths:
      - 'src/version.txt' # Il server partirà SOLO se viene modificato questo file
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ==========================================
  # JOB 1: BUILD PER WINDOWS (.exe)
  # ==========================================
  build-windows:
    runs-on: windows-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4
      with:
        # Storia completa e tag: servono per generare il changelog
        fetch-depth: 0

    - name: Leggi la versione da version.txt
      shell: bash
      run: |
        VERSION=$(cat src/version.txt)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Genera changelog dai commit
      shell: bash
      run: |
        # Ultimo tag precedente a questa versione (se esiste)
        PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v "^v${VERSION}$" | head -1 || true)
        {
          echo "## Novità della versione ${VERSION}"
          echo ""
          if [ -n "$PREV_TAG" ]; then
            git log --pretty="- %s" "${PREV_TAG}..HEAD" | head -50
          else
            git log --pretty="- %s" -20
          fi
          echo ""
          echo "---"
          echo "Scarica qui sotto la versione per il tuo sistema operativo."
        } > CHANGELOG_RELEASE.md
        cat CHANGELOG_RELEASE.md

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yfinance pandas requests pyinstaller httpx tenacity cryptography keyring

    - name: Creazione Cartella Eseguibile (PyInstaller)
      shell: bash
      run: |
        cd src
        ICON_ARGS=""
        if [ -f "icon.ico" ]; then
          ICON_ARGS="--icon=icon.ico --add-data icon.ico;."
          echo "Trovata icon.ico: la includo nella build."
        else
          echo "Nessuna icona trovata: eseguo la build standard senza icona."
        fi
        pyinstaller --onedir --noconsole --name=QuantumValue_Analysis $ICON_ARGS \
          --hidden-import=pandas --hidden-import=requests --hidden-import=yfinance \
          --hidden-import=httpx --hidden-import=tenacity --hidden-import=cryptography \
          --collect-all=yfinance --collect-all=PyQt6 --add-data "version.txt;." main.py

    - name: Copia i file necessari nella directory dist
      run: |
        # PyInstaller crea la directory dist all'interno di src, quindi dobbiamo copiare da lì
        # Crea la directory dist nella root se non esiste
        if (!(Test-Path "dist")) {
          New-Item -ItemType Directory -Path "dist" -Force | Out-Null
        }
        
        # Copia tutto da src/dist a dist (se esiste)
        if (Test-Path "src\dist") {
          Copy-Item -Path "src\dist\*" -Destination "dist" -Recurse -Force
        } else {
          Write-Host "Attenzione: directory src\dist non trovata"
          exit 1
        }
        
        # Copia l'icona nella directory corrente per Inno Setup
        # e in dist/QuantumValue_Analysis per l'installer
        if (Test-Path "src\icon.ico") {
          Copy-Item -Path "src\icon.ico" -Destination ".\icon.ico" -Force
          # Assicurati che la directory dist/QuantumValue_Analysis esista
          if (!(Test-Path "dist\QuantumValue_Analysis")) {
            New-Item -ItemType Directory -Path "dist\QuantumValue_Analysis" -Force | Out-Null
          }
          Copy-Item -Path "src\icon.ico" -Destination "dist\QuantumValue_Analysis\icon.ico" -Force
        }

    - name: Creazione script Inno Setup (.iss)
      run: |
        $iconLine = ""
        if (Test-Path ".\icon.ico") {
            $iconLine = "SetupIconFile=icon.ico"
        }

        $issContent = @"
        [Setup]
        AppName=QuantumValue Analysis
        AppVersion=$env:VERSION
        AppPublisher=Enrico Martini
        DefaultDirName={autopf}\QuantumValue Analysis
        DefaultGroupName=QuantumValue Analysis
        OutputDir=Output_Installer
        OutputBaseFilename=QuantumValue_Analysis_Setup_v$env:VERSION
        Compression=lzma2
        SolidCompression=yes
        PrivilegesRequired=admin
        $iconLine

        [Files]
        Source: "dist\QuantumValue_Analysis\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
        Source: "icon.ico"; DestDir: "{app}"; Flags: ignoreversion

        [Icons]
        Name: "{group}\QuantumValue Analysis"; Filename: "{app}\QuantumValue_Analysis.exe"; IconFilename: "{app}\QuantumValue_Analysis.exe"
        Name: "{autodesktop}\QuantumValue Analysis"; Filename: "{app}\QuantumValue_Analysis.exe"; IconFilename: "{app}\QuantumValue_Analysis.exe"
        "@
        Set-Content -Path "setup_config.iss" -Value $issContent

    - name: Compilazione Installer (Inno Setup)
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup_config.iss

    - name: Pubblica la Release su GitHub (Windows)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        name: QuantumValue Analysis v${{ env.VERSION }}
        body_path: CHANGELOG_RELEASE.md
        files: Output_Installer/QuantumValue_Analysis_Setup_v${{ env.VERSION }}.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ==========================================
  # JOB 2: BUILD PER LINUX (.deb)
  # ==========================================
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Leggi la versione da version.txt
      shell: bash
      run: |
        VERSION=$(cat src/version.txt)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Installazione dipendenze di sistema (Debian/Ubuntu)
      run: |
        sudo apt-get update
        sudo apt-get install -y imagemagick dpkg-dev

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yfinance pandas requests pyinstaller httpx tenacity cryptography keyring

    - name: Creazione Eseguibile Linux (PyInstaller)
      shell: bash
      run: |
        cd src
        ICON_ARGS=""
        if [ -f "icon.ico" ]; then
          # Nota: Su Linux si usa i due punti ':' per separare i path in --add-data
          ICON_ARGS="--icon=icon.ico --add-data icon.ico:."
          echo "Trovata icon.ico: la includo nella build."
        else
          echo "Nessuna icona trovata: eseguo la build standard senza icona."
        fi
        pyinstaller --onedir --noconsole --name=QuantumValue_Analysis $ICON_ARGS \
          --hidden-import=pandas --hidden-import=requests --hidden-import=yfinance \
          --hidden-import=httpx --hidden-import=tenacity --hidden-import=cryptography \
          --collect-all=yfinance --collect-all=PyQt6 --add-data "version.txt:." main.py

    - name: Impacchettamento nel formato Debian (.deb)
      shell: bash
      run: |
        VERSION=${{ env.VERSION }}
        DEB_DIR="QuantumValue_Analysis_v${VERSION}_amd64"
        
        # 1. Crea la struttura delle cartelle standard di Linux
        mkdir -p $DEB_DIR/DEBIAN
        mkdir -p $DEB_DIR/opt/QuantumValue
        mkdir -p $DEB_DIR/usr/share/applications
        mkdir -p $DEB_DIR/usr/share/icons/hicolor/256x256/apps

        # 2. Copia l'applicazione dentro /opt/
        # PyInstaller crea dist all'interno di src, quindi copiamo da lì
        if [ -d "src/dist/QuantumValue_Analysis" ]; then
          cp -r src/dist/QuantumValue_Analysis/* $DEB_DIR/opt/QuantumValue/
          chmod +x $DEB_DIR/opt/QuantumValue/QuantumValue_Analysis
        else
          echo "Attenzione: directory src/dist/QuantumValue_Analysis non trovata"
          exit 1
        fi
        
        # 3. Copia l'icona nella directory corretta
        if [ -f "src/icon.ico" ]; then
          cp src/icon.ico $DEB_DIR/opt/QuantumValue/icon.ico
          # Copia anche nella directory corrente per eventuali riferimenti
          cp src/icon.ico .
        fi

        # 4. Crea il file 'control' necessario al package manager APT/dpkg
        cat <<EOF > $DEB_DIR/DEBIAN/control
        Package: quantumvalue-analysis
        Version: ${VERSION}
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Enrico Martini
        Description: QuantumValue Analysis - Analisi Fondamentale e Value Investing.
        EOF

        # 5. Gestione dinamica dell'icona per Linux
        if [ -f "src/icon.ico" ]; then
          convert src/icon.ico[0] -resize 256x256 $DEB_DIR/usr/share/icons/hicolor/256x256/apps/quantumvalue.png || true
          ICON_LINE="Icon=/opt/QuantumValue/icon.ico"
        fi

        # 6. Crea il file .desktop per farlo comparire nel menu delle applicazioni
        cat <<EOF > $DEB_DIR/usr/share/applications/quantumvalue.desktop
        [Desktop Entry]
        Version=${VERSION}
        Name=QuantumValue Analysis
        Comment=Analisi Fondamentale e Occasioni in Borsa
        Exec=/opt/QuantumValue/QuantumValue_Analysis
        Icon=/opt/QuantumValue/icon.ico
        Terminal=false
        Type=Application
        Categories=Finance;Office;
        EOF

        # 7. Compila finalmente il pacchetto .deb
        dpkg-deb --build $DEB_DIR

    - name: Pubblica la Release su GitHub (Linux)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        files: QuantumValue_Analysis_v${{ env.VERSION }}_amd64.deb
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  # ==========================================
  # JOB 3: BUILD PER MACOS (.app in .zip)
  # ==========================================
  build-macos:
    runs-on: macos-latest
    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Leggi la versione da version.txt
      shell: bash
      run: |
        VERSION=$(cat src/version.txt)
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yfinance pandas requests pyinstaller httpx tenacity cryptography keyring

    - name: Creazione Bundle macOS (PyInstaller)
      shell: bash
      run: |
        cd src
        # Nota: --windowed su macOS produce un bundle .app; l'icona .ico
        # non e' supportata nativamente (servirebbe .icns), quindi si omette.
        pyinstaller --onedir --windowed --name=QuantumValue_Analysis \
          --hidden-import=pandas --hidden-import=requests --hidden-import=yfinance \
          --hidden-import=httpx --hidden-import=tenacity --hidden-import=cryptography \
          --collect-all=yfinance --collect-all=PyQt6 --add-data "version.txt:." main.py

    - name: Comprimi il bundle .app in .zip
      shell: bash
      run: |
        # ditto preserva metadati e permessi del bundle macOS
        ditto -c -k --keepParent "src/dist/QuantumValue_Analysis.app" \
          "QuantumValue_Analysis_v${VERSION}_macOS.zip"

    - name: Pubblica la Release su GitHub (macOS)
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ env.VERSION }}
        files: QuantumValue_Analysis_v${{ env.VERSION }}_macOS.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
