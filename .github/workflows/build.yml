name: Build QuantumValue Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Aggiunto per forzare l'uso di Node 24 e silenziare il deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout del codice
      uses: actions/checkout@v4

    - name: Installazione Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Installazione Librerie
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 yfinance pandas requests pyinstaller

    - name: Creazione EXE con PyInstaller
      run: |
        pyinstaller --onedir --noconsole --name=QuantumValue_Analysis QuantumValue_Analysis.py

    - name: Archiviazione Risultato
      uses: actions/upload-artifact@v4
      with:
        name: QuantumValue-Windows-Binary
        path: dist/QuantumValue_Analysis
